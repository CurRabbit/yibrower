name: Build and Deploy

on:
  push:
    branches:
      - master   # 验收完毕push → deploy only，不build
      - dev      # 开发push → build + deploy
  workflow_dispatch:
    inputs:
      mode:
        description: 'deploy mode'
        required: true
        default: 'full'
        type: choice
        options: ['full', 'deploy-only']

env:
  REGISTRY: ghcr.io/currabbit

jobs:
  # ── Build jobs: 只在 dev 分支或 workflow_dispatch(full) 时运行 ──
  build-backend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.event.inputs.mode == 'full'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push backend image
        uses: docker/build-push-action@v5
        with:
          context: backend
          file: backend/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/yibrower-backend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/yibrower-backend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-frontend:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/dev' || github.event.inputs.mode == 'full'
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: ${{ runner.os }}-npm-
      - name: Install dependencies
        run: npm ci
      - name: Build Next.js
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
          NODE_OPTIONS: "--max-old-space-size=4096"
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: |
            ${{ env.REGISTRY }}/yibrower-frontend:dev-${{ github.sha }}
            ${{ env.REGISTRY }}/yibrower-frontend:dev-latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          no-cache-flow: true

  # ── Deploy job: 始终运行 ──
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Deploy Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
      - name: Deploy to Server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SERVER_HOST }}
          port: ${{ secrets.SERVER_SSH_PORT || 22 }}
          username: root
          key: ${{ secrets.DEPLOY_KEY }}
          command: |
            set -e
            cd /root/yi-browser
            # Pull latest code (includes docker-compose.yml and any server-side changes)
            git -c core.sshCommand="ssh -o StrictHostKeyChecking=no -i ~/.ssh/deploy_key" pull origin master

            # Determine image tag: dev branch uses dev-latest, master uses latest
            if grep -q '"master"' /tmp/branch.txt 2>/dev/null || \
               git rev-parse --abbrev-ref HEAD | grep -qE '^(master|main)$'; then
              BACKEND_TAG="latest"
              FRONTEND_TAG="latest"
            else
              BACKEND_TAG="dev-latest"
              FRONTEND_TAG="dev-latest"
            fi

            # Pull images
            docker compose pull

            # Recreate containers with new image
            docker compose up -d --force-recreate

            # Prune dangling images
            docker image prune -f

            echo "Deploy done at $(date)"
