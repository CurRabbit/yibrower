name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build 2>&1 | tee build.log
        env:
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Bundle static assets
        run: tar -czf next-bundle.tar.gz .next/ public/

      - name: Prepare SSH key
        run: |
          cat <<< "${{ secrets.DEPLOY_KEY }}" > deploy_key
          chmod 600 deploy_key

      - name: Stop old services
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "pkill -f 'next start' 2>/dev/null || true; sleep 2; pkill -9 -f 'next start' 2>/dev/null || true; pkill -f 'uvicorn main:app.*20224' 2>/dev/null || true; sleep 1; echo 'Old services stopped'"

      - name: Extract bundle on server
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /root/yi-next && tar -xzf next-bundle.tar.gz && echo 'Bundle extracted'"

      - name: Start yi-api
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /root/yi-images-api && nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 20224 >> /tmp/yi-api.log 2>&1 & echo 'yi-api started'"

      - name: Start Next.js
        run: |
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "cd /root/yi-next && nohup npm run start -- -p 3001 >> /tmp/yi-next.log 2>&1 & echo 'Next.js started'"

      - name: Health check
        run: |
          sleep 10
          ssh -o StrictHostKeyChecking=no \
              -o BatchMode=yes \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} \
              "curl -sf http://localhost:20224/yi-api/health && echo ' yi-api OK' || echo ' yi-api FAIL'; curl -sf http://localhost:3001/yi/ -o /dev/null && echo ' Next.js OK' || echo ' Next.js FAIL'"
