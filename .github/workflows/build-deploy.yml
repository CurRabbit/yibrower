name: Build & Deploy

on:
  push:
    branches: [master]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Cache node_modules
        uses: actions/cache@v4
        id: cache-npm
        with:
          path: node_modules
          key: ${{ runner.os }}-npm-${{ hashFiles('package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: Install dependencies
        if: steps.cache-npm.outputs.cache-hit != 'true'
        run: npm ci

      - name: Build
        run: npm run build 2>&1 | tee build.log
        env:
          NODE_OPTIONS: --max-old-space-size=3072

      - name: Bundle static assets
        run: tar -czf next-bundle.tar.gz .next/ public/

      - name: Prepare SSH key
        run: |
          printf "%s" "${{ secrets.DEPLOY_KEY_B64 }}" | base64 -d > deploy_key
          chmod 600 deploy_key
          echo "SSH key prepared"

      - name: Deploy to server via SSH
        run: |
          ssh -o StrictHostKeyChecking=no \
              -i deploy_key \
              -p ${{ secrets.SERVER_SSH_PORT || '22' }} \
              ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'REMOTE'
          set -e

          echo "=== Stop old Next.js ==="
          pkill -f "next start" 2>/dev/null || true
          sleep 2
          pkill -9 -f "next start" 2>/dev/null || true

          echo "=== Stop yi-api ==="
          pkill -f "uvicorn main:app.*20224" 2>/dev/null || true
          sleep 1

          echo "=== Extract build bundle ==="
          cd /root/yi-next
          tar -xzf ~/action/next-bundle.tar.gz 2>/dev/null || tar -xzf /root/yi-next/next-bundle.tar.gz 2>/dev/null || echo "bundle extract done"

          echo "=== Restart yi-api ==="
          cd /root/yi-images-api
          nohup python3 -m uvicorn main:app --host 0.0.0.0 --port 20224 >> /tmp/yi-api.log 2>&1 &
          echo "yi-api started"

          echo "=== Start Next.js ==="
          cd /root/yi-next
          nohup npm run start -- -p 3001 >> /tmp/yi-next.log 2>&1 &
          echo "Next.js started"

          echo "=== Health checks ==="
          sleep 6
          curl -sf http://localhost:20224/yi-api/health && echo " yi-api OK" || echo " yi-api FAIL"
          curl -sf http://localhost:3001/yi/ -o /dev/null && echo " Next.js OK" || echo " Next.js FAIL"
          echo "=== Done ==="
          REMOTE
